<title>役員会 参加確認</title>
<style>
/* ─── リセット & 基本 ─── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}
:root {
  --blue:       #1D6FA4;
  --blue-dark:  #155880;
  --blue-light: #EBF4FB;
  --green:      #059669;
  --gray-50:    #F0F7FF;
  --gray-100:   #D0DDE8;
  --gray-500:   #6B8299;
  --text:       #1A2D42;
  --white:      #ffffff;
  --radius-sm:  10px;
  --radius-md:  14px;
  --radius-lg:  20px;
  --shadow-sm:  0 2px 8px rgba(0,0,0,.06);
  --shadow-md:  0 4px 18px rgba(0,0,0,.09);
  --shadow-lg:  0 8px 32px rgba(0,0,0,.13);
}
html { height: 100%; }
body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: var(--gray-50);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ─── 横向き警告 ─── */
.lswarn {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--blue);
  z-index: 9999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--white);
  text-align: center;
  padding: 32px;
}
@media (orientation: landscape) { .lswarn { display: flex !important; } }

/* ─── ヘッダー ─── */
header {
  background: var(--blue);
  padding: 8px 14px;
  padding-top: calc(8px + env(safe-area-inset-top, 0px));
  display: flex;
  flex-direction: column;
  gap: 7px;
  box-shadow: 0 2px 10px rgba(0,0,0,.22);
  position: sticky;
  top: 0;
  z-index: 100;
  flex-shrink: 0;
}
.header-row1 { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.header-row2 { display: flex; gap: 6px; }
.header-row2 .nav-btn { flex: 1; text-align: center; padding: 7px 4px; font-size: 13px; }
.header-title {
  display: flex;
  align-items: center;
  gap: 7px;
  color: var(--white);
  font-size: 16px;
  font-weight: 800;
  letter-spacing: -.3px;
  white-space: nowrap;
}
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #34D399; flex-shrink: 0; }
.sync-dot.syncing { background: #FCD34D; }
.sync-dot.error   { background: #EF4444; }

.nav-btn {
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  border: 2px solid rgba(255,255,255,.4);
  background: transparent;
  color: var(--white);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s, border-color .15s, color .15s;
}
.nav-btn.active { background: var(--white); color: var(--blue); border-color: var(--white); }

/* ─── 画面 ─── */
.screen { display: none; }
/* 入力画面：縦いっぱいに広げる flex カラム */
#screenInput.visible {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  padding: 14px 14px 0;
  max-width: 860px;
  width: 100%;
  margin: 0 auto;
  overflow: hidden;
  animation: fadeUp .22s ease both;
}
/* 集計画面：通常スクロール */
#screenResult.visible {
  flex: 1;
  display: block;
  overflow-y: auto;
  padding: 18px 14px calc(24px + env(safe-area-inset-bottom, 0px));
  max-width: 860px;
  width: 100%;
  margin: 0 auto;
  animation: fadeUp .22s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── プログレス ─── */
.progress-wrap {
  display: flex;
  gap: 5px;
  margin-bottom: 12px;
  padding: 0 2px;
  flex-shrink: 0;
}
.prog-item { flex: 1; min-width: 0; }
.prog-label {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 5px;
}
.prog-num {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--gray-100);
  color: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 800;
  flex-shrink: 0;
  transition: background .2s;
}
.prog-num.done    { background: var(--blue); }
.prog-num.current { background: var(--blue); }
.prog-text {
  font-size: 9px;
  color: var(--gray-500);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.prog-text.current { color: var(--blue); font-weight: 700; }
.prog-bar {
  height: 5px;
  border-radius: 3px;
  background: var(--gray-100);
  transition: background .25s;
}
.prog-bar.done { background: var(--blue); }
.prog-bar.half { background: linear-gradient(to right, var(--blue) 50%, var(--gray-100) 50%); }

/* ─── 戻るボタン ─── */
.back-btn {
  display: none;
  align-items: center;
  gap: 6px;
  background: var(--white);
  border: 2px solid var(--gray-100);
  border-radius: var(--radius-sm);
  padding: 9px 16px;
  font-size: 14px;
  font-weight: 700;
  color: var(--gray-500);
  cursor: pointer;
  font-family: inherit;
  margin-bottom: 10px;
  transition: border-color .15s, color .15s;
  width: fit-content;
  flex-shrink: 0;
}
.back-btn:active { border-color: var(--blue); color: var(--blue); }
.back-btn.visible { display: flex; }

/* ─── 質問カード ─── */
.q-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 12px 16px;
  box-shadow: var(--shadow-md);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.q-emoji  { font-size: 30px; flex-shrink: 0; }
.q-title  { font-size: 19px; font-weight: 900; color: var(--text); line-height: 1.25; }
.q-sub    { font-size: 12px; color: var(--gray-500); margin-top: 3px; }

/* ─── 選択肢ボタン共通 ─── */
.opt-btn {
  background: var(--white);
  border: 3px solid var(--gray-100);
  border-radius: var(--radius-md);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  box-shadow: var(--shadow-sm);
  font-family: inherit;
  padding: 14px 6px;
  transition: border-color .14s, background .14s, box-shadow .14s, transform .1s;
  -webkit-user-select: none;
  user-select: none;
}
.opt-btn:active { transform: scale(0.94); }
.opt-btn.selected {
  background: var(--blue);
  border-color: var(--blue);
  box-shadow: 0 6px 20px rgba(29,111,164,.3);
  transform: scale(0.97);
}
.opt-label {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  text-align: center;
  line-height: 1.3;
}
.opt-btn.selected .opt-label { color: var(--white); }

/* ─── 支部グリッド ─── */
.branch-row {
  display: flex;
  gap: 9px;
  justify-content: flex-start;
  flex: 1;
  min-height: 0;
}
.branch-btn {
  /* 3列レイアウト基準の固定幅: (100% - gap×2) / 3 */
  width: calc((100% - 18px) / 3);
  flex: 0 0 calc((100% - 18px) / 3);
  min-height: 0;
}
.branch-btn .opt-label { font-size: clamp(12px, 2.2dvh, 22px); font-weight: 800; }

/* ─── 班選択 ─── */
.ban-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 10px;
  flex: 1;
  min-height: 0;
}
.opt-btn.ban { padding: 8px; min-height: 0; }
.opt-btn.ban .opt-label { font-size: clamp(22px, 5dvh, 52px); font-weight: 900; }

/* ─── LINE選択 ─── */
.line-list { display: flex; flex-direction: column; gap: 10px; flex: 1; min-height: 0; }
.line-btn {
  flex: 1;
  min-height: 0;
  flex-direction: row;
  justify-content: flex-start;
  padding: 12px 20px;
  gap: 14px;
}
.line-icon { font-size: clamp(28px, 5.5dvh, 58px); flex-shrink: 0; }
.line-btn .opt-label { font-size: clamp(16px, 3dvh, 32px); text-align: left; }

/* ─── QRコード ─── */
.qr-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 28px 20px;
  box-shadow: var(--shadow-md);
  margin-bottom: 18px;
  text-align: center;
}

  font-size: 14px;

}
.qr-img {
  width: 200px;
  height: 200px;

  border: 3px solid var(--gray-50);
}
.qr-hint {
  font-size: 13px;
  color: var(--green);
  font-weight: 700;
  margin-bottom: 20px;
}
.qr-next-btn {
  width: 100%;
  padding: 18px;
  border-radius: var(--radius-md);

  background: var(--green);
  color: var(--white);
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: opacity .15s;
}

/* ─── 確認画面 ─── */
.confirm-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 22px 18px;
  box-shadow: var(--shadow-md);
  margin-bottom: 16px;
}

  font-size: 19px;
  font-weight: 900;
  color: var(--text);
  text-align: center;
  margin-bottom: 16px;
}
.confirm-row {
  display: flex;
  align-items: center;
  padding: 13px 0;
  border-bottom: 1px solid #EEF3F8;
  gap: 10px;
}
.confirm-row:last-child { border-bottom: none; }
.confirm-q-name { font-size: 11px; color: var(--gray-500); margin-bottom: 3px; }
.confirm-answer {
  font-size: 19px;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 6px;
}
.action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.action-btn {
  padding: 18px 10px;
  border-radius: var(--radius-md);
  border: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  font-size: 17px;
  font-weight: 700;
  font-family: inherit;
  color: var(--white);
  transition: opacity .15s, transform .1s;
}
.action-btn:active { opacity: .82; transform: scale(0.97); }

/* ─── 集計画面 ─── */
.result-summary {
  background: var(--blue);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  margin-bottom: 14px;
}
.result-total-num { font-size: 40px; font-weight: 900; color: var(--white); line-height: 1; }
.result-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.result-btn {
  padding: 8px 13px;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: opacity .15s;
}
.result-btn:active { opacity: .75; }
.chart-tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.chart-tab {
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  border: 2px solid var(--gray-100);
  background: var(--white);
  color: var(--gray-500);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s, color .15s, border-color .15s;
}
.chart-tab.active { background: var(--blue); color: var(--white); border-color: var(--blue); }
.chart-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 16px 14px;
  box-shadow: var(--shadow-sm);
  margin-bottom: 12px;
}
.chart-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
table { width: 100%; border-collapse: collapse; }
th {
  padding: 7px 10px;
  text-align: left;
  font-size: 11px;
  color: var(--gray-500);
  font-weight: 700;
  background: var(--gray-50);
}
td {
  padding: 9px 10px;
  font-size: 13px;
  color: var(--text);
  border-bottom: 1px solid #EEF3F8;
}

.bar-mini  { height: 12px; background: #EEF3F8; border-radius: 4px; overflow: hidden; min-width: 60px; }
.bar-fill  { height: 100%; border-radius: 4px; transition: width .3s ease; }
.empty { text-align: center; padding: 50px 0; color: var(--gray-500); }

/* ─── ダイアログ ─── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.52);
  z-index: 400;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.overlay.visible { display: flex; }
.dialog {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 28px 22px;
  max-width: 340px;
  width: 100%;
  text-align: center;
  box-shadow: var(--shadow-lg);
  animation: popIn .18s ease both;
}
@keyframes popIn {
  from { opacity: 0; transform: scale(.9); }
  to   { opacity: 1; transform: scale(1); }
}
.dialog-btn {
  padding: 18px 24px;
  border-radius: var(--radius-md);
  border: none;
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: opacity .15s;
  flex: 1;
}
.dialog-btn:active { opacity: .78; }

/* ─── 完了バナー ─── */
.done-banner {
  background: var(--green);
  border-radius: var(--radius-lg);
  padding: 24px;
  text-align: center;
  color: var(--white);
  margin-bottom: 20px;
  animation: fadeUp .25s ease both;
}

/* ─── トースト ─── */
.toast {
  position: fixed;
  bottom: calc(24px + env(safe-area-inset-bottom, 0px));
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--text);
  color: var(--white);
  padding: 11px 22px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 700;
  z-index: 999;
  white-space: nowrap;
  transition: transform .28s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
  box-shadow: 0 4px 16px rgba(0,0,0,.25);
}
.toast.show { transform: translateX(-50%) translateY(0); }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.pulse { animation: pulse 2s infinite; }

/* ─── ステップ切替アニメ ─── */
#stepContent {
  animation: fadeUp .2s ease both;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow-y: auto;
  padding-bottom: env(safe-area-inset-bottom, 12px);
}
/* ─── 住所選択モーダル ─── */
.addr-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 300;
  align-items: flex-end;
  justify-content: center;
}
.addr-overlay.visible { display: flex; }

  background: var(--white);

.addr-header {

}
.addr-btn-sub {
  font-size: clamp(11px, 1.8dvh, 16px);
  color: var(--gray-500);
  margin-left: auto;
}
.addr-not-found {
  text-align: center;
  padding: 40px 20px;
  color: var(--gray-500);
  font-size: 14px;
  line-height: 1.8;
}

  20%  { box-shadow: 0 0 0 6px rgba(29,111,164,.35); background-color: #BFE0F5; }
  100% { box-shadow: 0 0 0 0 rgba(29,111,164,0); background-color: inherit; }

/* ─── 座席案内オーバーレイ ─── */
.seat-overlay {

  inset: 0;

  z-index: 500;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;

}

.toggle-wrap { flex-shrink: 0; cursor: pointer; }

// 状態
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let DB_URL      = "https://ogawa-enquete-default-rtdb.firebaseio.com";
let step        = 0;
let answers     = {};

// ─── 設定 ───
// localStorage から復元、なければデフォルト true
let settings = (() => {
  try {
    const s = JSON.parse(localStorage.getItem("yakuinkai_settings") || "{}");
    return {
      showBanchoLine:   s.showBanchoLine   !== false,
      showJichikaiLine: s.showJichikaiLine !== false,
    };
  } catch { return { showBanchoLine: true, showJichikaiLine: true }; }
})();

function saveSettings() {
  try { localStorage.setItem("yakuinkai_settings", JSON.stringify(settings)); } catch {}
}
let responses   = [];
let activeChart = "cross";
let currentDialog = null;
let pollerTimer = null;
let onlineKeys  = new Set(); // "branchId_groupId" 形式でオンライン参加を記録
let onlineMap   = new Map(); // key → 登録タイムスタンプ（最新）
let pendingOnlineWrite = 0; // 書き込み中カウンタ
let absentKeys  = new Set(); // 欠席
let absentMap   = new Map(); // key → タイムスタンプ
let pendingAbsentWrite = 0;
const STORAGE_KEY = "yakuinkai_v1";

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Firebase
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const ONLINE_KEY    = STORAGE_KEY + "_online";    // オンライン参加データの Firebase パス
const ABSENT_KEY    = STORAGE_KEY + "_absent";    // 欠席データの Firebase パス
const SETTINGS_KEY  = STORAGE_KEY + "_settings";  // 設定データの Firebase パス

// 設定をFirebaseへ書き込み
async function pushSettings() {
  try {
    await fetch(`${DB_URL}/${SETTINGS_KEY}.json`, {
      method: "PUT",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(settings),
    });
  } catch {}
}

let pendingSettingsWrite = 0; // 書き込み中はポーリングで上書きしない

async function fetchData(showLoading = false) {
  if (!DB_URL) return;
  if (showLoading) setSyncing(true);
  try {
    const [res1, res2, res3, res4] = await Promise.all([
      fetch(`${DB_URL}/${STORAGE_KEY}.json`),
      fetch(`${DB_URL}/${ONLINE_KEY}.json`),
      fetch(`${DB_URL}/${SETTINGS_KEY}.json`),
      fetch(`${DB_URL}/${ABSENT_KEY}.json`),
    ]);
    const data1 = await res1.json();
    const data2 = await res2.json();
    const data3 = await res3.json();
    const data4 = await res4.json();

    responses = data1 ? Object.values(data1) : [];

    if (pendingOnlineWrite === 0) {
      onlineKeys.clear();
      onlineMap.clear();
      if (data2) {
        Object.entries(data2).forEach(([key, rec]) => {
          onlineKeys.add(key);
          onlineMap.set(key, rec.ts);
        });
      }
    }

    // 欠席データを Firebase で同期（書き込み中はスキップ）
    if (pendingAbsentWrite === 0) {
      absentKeys.clear();
      absentMap.clear();
      if (data4) {
        Object.entries(data4).forEach(([key, rec]) => {
          absentKeys.add(key);
          absentMap.set(key, rec.ts);
        });
      }
    }

    // 設定を Firebase データで同期（書き込み中はスキップ）
    if (pendingSettingsWrite === 0 && data3 && typeof data3 === "object") {
      let changed = false;
      if (typeof data3.showBanchoLine   === "boolean" && data3.showBanchoLine   !== settings.showBanchoLine)   { settings.showBanchoLine   = data3.showBanchoLine;   changed = true; }
      if (typeof data3.showJichikaiLine === "boolean" && data3.showJichikaiLine !== settings.showJichikaiLine) { settings.showJichikaiLine = data3.showJichikaiLine; changed = true; }
      if (changed) {
        saveSettings();
        updateToggleUI();
        if (step >= getFlow().length) step = 0; // 範囲外になったらリセット
        buildStep();
      }
    }

    setLastSync();
    setSyncing(false);
    if (document.getElementById("screenResult").classList.contains("visible")) {
      buildResultScreen();
    }
  } catch(e) {
    setSyncing(false);
    setSyncError();
  }
}

async function pushResponse(record) {
  await fetch(`${DB_URL}/${STORAGE_KEY}.json`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(record),
  });
}

// オンライン参加をFirebaseに書き込み（PUT: keyを固定してupsert）
async function pushOnline(bid, gid, ts) {
  const key     = bid + "_" + gid;
  const branch  = BRANCHES.find(b => b.id === bid);
  const group   = GROUPS.find(g => g.id === gid);
  await fetch(`${DB_URL}/${ONLINE_KEY}/${key}.json`, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      branch: bid, branchLabel: branch?.label,
      group:  gid, groupLabel:  group?.label,
      ts,
    }),
  });
}

// オンライン参加をFirebaseから削除
async function deleteOnline(bid, gid) {
  const key = bid + "_" + gid;
  await fetch(`${DB_URL}/${ONLINE_KEY}/${key}.json`, {method: "DELETE"});
}

// 欠席をFirebaseに書き込み
async function pushAbsent(bid, gid, ts) {
  const key    = bid + "_" + gid;
  const branch = BRANCHES.find(b => b.id === bid);
  const group  = GROUPS.find(g => g.id === gid);
  await fetch(`${DB_URL}/${ABSENT_KEY}/${key}.json`, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ branch: bid, branchLabel: branch?.label, group: gid, groupLabel: group?.label, ts }),
  });
}

// 欠席をFirebaseから削除
async function deleteAbsent(bid, gid) {
  await fetch(`${DB_URL}/${ABSENT_KEY}/${bid}_${gid}.json`, {method: "DELETE"});
}

async function clearData() {
  absentKeys.clear(); absentMap.clear();
  await Promise.all([
    fetch(`${DB_URL}/${STORAGE_KEY}.json`, {method: "DELETE"}),
    fetch(`${DB_URL}/${ONLINE_KEY}.json`,  {method: "DELETE"}),
    fetch(`${DB_URL}/${ABSENT_KEY}.json`,  {method: "DELETE"}),
  ]);
}

function startPoller() {
  clearInterval(pollerTimer);
  pollerTimer = setInterval(() => fetchData(false), 3000);
}

function setSyncing(on) {
  const dot = document.getElementById("syncDot");
  dot.className = "sync-dot" + (on ? " syncing" : "");
  document.getElementById("syncLabel").textContent = on ? "同期中..." : "同期済";
}
function setSyncError() {
  const dot = document.getElementById("syncDot");
  dot.className = "sync-dot error";
  document.getElementById("syncLabel").textContent = "接続エラー";
}
function setLastSync() {
  document.getElementById("lastSyncText").textContent =
    `最終更新: ${new Date().toLocaleTimeString("ja-JP")}`;
}

// フロー判定ヘルパー
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// 班長LINE=未登録 → 班長QR表示
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// フロー管理（名前付き配列方式）
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// settings と answers に基づいてアクティブなステップ名の配列を返す
function getFlow() {
  const f = ["start", "branch", "group"];
  if (settings.showBanchoLine) {
    f.push("banchoLine");
    if (answers.line === "unregistered") f.push("banchoQR");
  }
  if (settings.showJichikaiLine && answers.line !== "no_line") {
    f.push("jichikaiLine");
    if (answers.jichikai_line === "unregistered") f.push("jichikaiQR");
  }
  f.push("confirm");
  return f;
}

// 後方互換ヘルパー（Firebase送信・集計等が参照）
function needsBanchoQR()   { return settings.showBanchoLine && answers.line === "unregistered"; }
function skipJichikai()    { return settings.showBanchoLine && answers.line === "no_line"; }
function needsJichikaiQR() { return settings.showJichikaiLine && answers.jichikai_line === "unregistered"; }

// 現在のステップ名
function currentStepName() { return getFlow()[step]; }

// プログレスバーラベル
function progressLabels() {
  const map = {
    start: "選択", branch: "支部選択", group: "班選択",
    banchoLine: "班長LINE", banchoQR: "班長QR",
    jichikaiLine: "自治会LINE", jichikaiQR: "自治会QR",
    confirm: "確認"
  };
  return getFlow().map(s => map[s] || s);
}

function buildStep() {
  const flow   = getFlow();
  const labels = progressLabels();

  // プログレスバー
  document.getElementById("progressWrap").innerHTML = labels.map((lbl, i) => `
    <div class="prog-item">
      <div class="prog-label">
        <div class="prog-num ${i < step ? "done" : i === step ? "current" : ""}">
          ${i < step ? "✓" : i + 1}
        </div>
        <span class="prog-text ${i === step ? "current" : ""}">
          ${lbl.length > 4 ? lbl.slice(0,4) : lbl}
        </span>
      </div>
      <div class="prog-bar ${i < step ? "done" : i === step ? "half" : ""}"></div>
    </div>
  `).join("");

  // 戻るボタン（start画面では非表示）
  document.getElementById("backBtn").classList.toggle("visible", step > 0);

  // ステップ名でルーティング
  const name = flow[step] || "confirm";
  if      (name === "start")        buildStartStep();
  else if (name === "branch")       buildBranchStep();
  else if (name === "group")        buildGroupStep();
  else if (name === "banchoLine")   buildLineStep();
  else if (name === "banchoQR")     buildBanchoQRStep();
  else if (name === "jichikaiLine") buildJichikaiLineStep();
  else if (name === "jichikaiQR")   buildJichikaiQRStep();
  else                              buildConfirmStep();
}

// ── 選択方法の選択（最初の画面）──
function buildStartStep() {
  setStepContent(`
    <div class="q-card">
      <div class="q-emoji">📋</div>

// ダイアログ
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const DIALOGS = {
  confirm: {icon:"✅", title:"登録を確定しますか？",       sub:"OKを押すと次の方の入力へ進みます", okBg:"#1D6FA4"},
  edit:    {icon:"✏️", title:"入力をやり直しますか？",      sub:"入力した内容はリセットされます",     okBg:"#1D6FA4"},
  reset:   {icon:"🗑️", title:"データをリセットしますか？", sub:"全端末のデータが削除されます",       okBg:"#DC2626"},
};

function openDialog(type) {

  const d = DIALOGS[type];
  document.getElementById("dlgIcon").textContent  = d.icon;
  document.getElementById("dlgTitle").textContent = d.title;
  document.getElementById("dlgSub").textContent   = d.sub;

  document.getElementById("dlgOkBtn").style.color      = "white";
  document.getElementById("dialogOverlay").classList.add("visible");
}
function closeDialog() {
  document.getElementById("dialogOverlay").classList.remove("visible");
}

async function dialogOK() {
  const type = currentDialog;
  closeDialog();

  if (type === "confirm") {
    setSyncing(true);
    const branch = BRANCHES.find(b => b.id === answers.branch);
    const group  = GROUPS.find(g => g.id === answers.group);
    const line   = LINE_STATUS.find(l => l.id === answers.line);
    const jLine  = LINE_STATUS.find(l => l.id === answers.jichikai_line);
    // 未登録→QR経由の場合は「QRで登録」に変更
    const lineLabel = !settings.showBanchoLine
      ? "（画面なし）"
      : answers.line === "unregistered"
        ? "QRで登録"
        : line?.label?.replace("\n", "") ?? "";
    const jichikaiLineLabel = !settings.showJichikaiLine
      ? "（画面なし）"
      : skipJichikai()
        ? "（スキップ）"
        : answers.jichikai_line === "unregistered"
          ? "QRで登録"
          : jLine?.label?.replace("\n", "") ?? "";
    await pushResponse({
      branch:            answers.branch,
      branchLabel:       branch?.label,
      group:             answers.group,
      groupLabel:        group?.label,
      line:              answers.line,
      lineLabel:         lineLabel,
      jichikaiLine:      answers.jichikai_line ?? "skipped",
      jichikaiLineLabel: jichikaiLineLabel,
      key: `${answers.branch}_${answers.group}`,
      ts: Date.now(),
    });
    await fetchData(false);
    setSyncing(false);
    const savedBranch = answers.branch;
    const savedGroup  = answers.group;
    answers = {};
    step    = 0;
    showToast(`✅ 登録しました（${responses.length}件目）`);
    showSeatOverlay(savedBranch, savedGroup);

  } else if (type === "edit") {
    answers = {};
    step    = 0;
    buildStep();

  } else if (type === "reset") {
    setSyncing(true);
    await clearData();
    await fetchData(false);
    setSyncing(false);
    buildResultScreen();
    showToast("🗑️ データをリセットしました");
  }
}

// 集計画面
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

async function toggleCellState(bid, gid) {
  const key = bid + "_" + gid;

  if (absentKeys.has(key)) {
    // 欠 → なし（元に戻す）
    absentKeys.delete(key);
    absentMap.delete(key);
    buildCrossTable(responses.length);
    pendingAbsentWrite++;
    try { await deleteAbsent(bid, gid); } finally { pendingAbsentWrite--; }

  } else if (onlineKeys.has(key)) {
    // 💻オンライン → 欠
    onlineKeys.delete(key);
    onlineMap.delete(key);
    const ts = Date.now();
    absentKeys.add(key);
    absentMap.set(key, ts);
    buildCrossTable(responses.length);
    pendingOnlineWrite++;
    pendingAbsentWrite++;
    try {
      await Promise.all([deleteOnline(bid, gid), pushAbsent(bid, gid, ts)]);
    } finally { pendingOnlineWrite--; pendingAbsentWrite--; }

  } else {
    // なし → 💻オンライン
    const ts = Date.now();
    onlineKeys.add(key);
    onlineMap.set(key, ts);
    buildCrossTable(responses.length);
    pendingOnlineWrite++;
    try { await pushOnline(bid, gid, ts); } finally { pendingOnlineWrite--; }
  }
}


function buildCrossTable(total) {
  const tableHeader = `<th>支部 \ 班</th>` +
    GROUPS.map(g => `<th style="text-align:center">${g.label}</th>`).join("") +
    `<th style="text-align:center;color:#1D6FA4">合計</th>`;

  const tableRows = BRANCHES.map(b => {
    const gids = BRANCH_GROUPS[b.id];
    const allCells = GROUPS.map(g => {
      if (!gids.includes(g.id)) {
        // 班が存在しない → 濃いグレー
        return `<td style="height:40px;background:#D0DDE8"></td>`;
      }
      const cnt    = responses.filter(r => r.branch === b.id && r.group === g.id).length;
      const key    = b.id + "_" + g.id;
      const online = onlineKeys.has(key);
      const absent = absentKeys.has(key);

      if (absent) {
        // 欠席 → タップで元に戻す
        return `<td style="height:40px;padding:0;text-align:center;cursor:pointer;background:#FEF2F2"
                    onclick="toggleCellState('${b.id}','${g.id}')" title="タップで取消">
                  <div style="display:flex;align-items:center;justify-content:center;height:40px;font-size:15px;font-weight:900;color:#DC2626">欠</div>
                </td>`;
      } else if (cnt === 0 && !online) {
        // 未参加 → タップでオンライン登録
        return `<td style="height:40px;text-align:center;cursor:pointer;color:#CBD5E1;font-size:10px"
                    onclick="toggleCellState('${b.id}','${g.id}')" title="タップで💻オンライン→欠→元に戻る">－</td>`;
      } else if (online) {
        // オンライン参加 → タップで欠席へ
        return `<td style="height:40px;padding:0;text-align:center;cursor:pointer;background:#EFF6FF"
                    onclick="toggleCellState('${b.id}','${g.id}')" title="タップで欠席に変更">
                  <div style="display:flex;align-items:center;justify-content:center;height:40px;font-size:16px">💻</div>
                </td>`;
      } else {
        // 対面参加あり
        return `<td style="height:40px;text-align:center;font-weight:700;color:#1D6FA4">${cnt}</td>`;
      }
    }).join("");

    const taimenCnt = responses.filter(r => r.branch === b.id).length;
    const onlineCnt = gids.filter(gid => onlineKeys.has(b.id + "_" + gid)).length;
    const absentCnt = gids.filter(gid => absentKeys.has(b.id + "_" + gid)).length;
    const rowTotal  = taimenCnt + onlineCnt; // 出席合計（欠席は含まない）
    const parts = [];
    if (taimenCnt > 0) parts.push(`対面${taimenCnt}`);
    if (onlineCnt > 0) parts.push(`💻${onlineCnt}`);
    if (absentCnt > 0) parts.push(`欠${absentCnt}`);
    const breakdown = parts.length > 0
      ? `<span style="font-size:9px;color:#6B8299;white-space:nowrap">（${parts.join("/")}）</span>`
      : "";
    const branchShort = b.label.replace("支部", "");

    return `<tr>
      <td style="height:40px;font-weight:700;white-space:nowrap;font-size:12px">${branchShort}</td>
      ${allCells}
      <td style="height:40px;padding:4px 6px;text-align:center;font-weight:700;color:#1D6FA4;background:#F0F7FF;white-space:nowrap">
        ${rowTotal}${breakdown}
      </td>
    </tr>`;
  }).join("");

  const colTotals = GROUPS.map(g => {
    const taimenCnt = responses.filter(r => r.group === g.id).length;
    const onlineCnt = BRANCHES.filter(b => onlineKeys.has(b.id + "_" + g.id)).length;
    const absentCnt = BRANCHES.filter(b => absentKeys.has(b.id + "_" + g.id)).length;
    const cnt = taimenCnt + onlineCnt;
    const sub = absentCnt > 0 ? `<br><span style="color:#DC2626;font-size:9px">欠${absentCnt}</span>` : "";
    return `<td style="text-align:center;font-weight:700;color:#1D6FA4;background:#F0F7FF">${cnt||""}${sub}</td>`;
  }).join("");

  const grandTaimen = responses.length;
  const grandOnline = onlineKeys.size;
  const grandAbsent = absentKeys.size;
  const grandTotal  = grandTaimen + grandOnline;

  // 未参加班一覧（対面もオンラインも未登録の班）
  const missingRows = BRANCHES.map(b => {
    const gids    = BRANCH_GROUPS[b.id];
    const missing = gids.filter(gid => {
      const hasResponse = responses.some(r => r.branch === b.id && r.group === gid);
      const isOnline    = onlineKeys.has(b.id + "_" + gid);
      const isAbsent    = absentKeys.has(b.id + "_" + gid);
      return !hasResponse && !isOnline && !isAbsent;
    });
    if (!missing.length) return "";
    const labels = missing.map(gid => GROUPS.find(g => g.id === gid).label).join("・");
    return `<tr>
      <td style="font-weight:700;white-space:nowrap;font-size:12px">${b.label}</td>
      <td style="color:#DC2626;font-size:12px">${labels}</td>
    </tr>`;
  }).join("");

  const missingSection = missingRows
    ? `<div class="chart-card" style="margin-top:12px">

// 共通：棒グラフ＋集計表カードを生成
function buildLineStatCard(title, data, total) {
  const maxC = Math.max(...data.map(d => d.count), 1);
  const W=520, H=180, pL=32, pR=8, pT=18, pB=48;
  const pw = W - pL - pR, ph = H - pT - pB;
  const bw = Math.min(pw / data.length * 0.55, 52);
  const gap = pw / data.length;
  let bars="", vals="", xlbls="", ylines="";
  for (let i = 0; i <= 4; i++) {
    const yv = Math.round(maxC * i / 4);
    const y  = pT + ph - (yv / maxC) * ph;
    ylines += `<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#EEF3F8" stroke-width="1"/>`;
    ylines += `<text x="${pL-4}" y="${y+4}" text-anchor="end" font-size="10" fill="#6B8299">${yv}</text>`;
  }
  data.forEach((d, i) => {
    const x  = pL + gap * i + gap / 2;
    const bh = d.count > 0 ? (d.count / maxC) * ph : 2;
    const y  = pT + ph - bh;
    bars += `<rect x="${x-bw/2}" y="${y}" width="${bw}" height="${bh}" rx="5" fill="${d.color}" opacity="0.9"/>`;
    if (d.count > 0) {
      const insideY = y + bh / 2 + 5;
      const labelInside = bh >= 28;
      if (labelInside) {
        vals += `<text x="${x}" y="${insideY}" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">${d.count}</text>`;
      } else {
        vals += `<text x="${x}" y="${y - 5}" text-anchor="middle" font-size="13" fill="#1A2D42" font-weight="700">${d.count}</text>`;
      }
    }
    const lbl = d.label.length > 6 ? d.label.slice(0,6) : d.label;
    xlbls += `<text x="${x}" y="${pT+ph+16}" text-anchor="middle" font-size="9" fill="#6B8299" transform="rotate(-30,${x},${pT+ph+16})">${lbl}</text>`;
  });
  const tableRows = data.map(d => `
    <tr>
      <td>${d.label}</td>
      <td class="td-count">${d.count}件</td>
      <td>${total>0?((d.count/total)*100).toFixed(1)+"%":"-"}</td>
      <td><div class="bar-mini"><div class="bar-fill" style="width:${total>0?d.count/total*100:0}%;background:${d.color}"></div></div></td>
    </tr>
  `).join("");
  return `
    <div class="chart-card">
      <div class="chart-title">${title}</div>
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
        ${ylines}${bars}${vals}${xlbls}
      </svg>
    </div>
    <div class="chart-card">
      <div class="chart-title">📋 集計表</div>
      <table>
        <thead><tr><th>項目</th><th>件数</th><th>割合</th><th>グラフ</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
  `;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CSV出力
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function downloadCSV() {
  if (!responses.length && !onlineMap.size) { showToast("⚠️ データがありません"); return; }
  const header = "番号,参加形式,支部,班,班長LINE登録状況,公式LINE登録状況,登録日時";

  // 対面参加行
  const taimenRows = responses.map((r, i) => [
    i + 1,
    "対面",
    r.branchLabel,
    r.groupLabel,
    r.lineLabel,
    r.jichikaiLineLabel ?? "（スキップ）",
    r.ts ? new Date(r.ts).toLocaleString("ja-JP") : "",
  ].join(","));

  // オンライン参加行
  let extraNum = responses.length + 1;
  const onlineRows = [];
  onlineMap.forEach((ts, key) => {
    const [bid, gid] = key.split("_");
    const branch = BRANCHES.find(b => b.id === bid);
    const group  = GROUPS.find(g => g.id === gid);
    onlineRows.push([extraNum++, "💻オンライン", branch?.label ?? bid, group?.label ?? gid, "－", "－", new Date(ts).toLocaleString("ja-JP")].join(","));
  });

  // 欠席行
  const absentRows = [];
  absentMap.forEach((ts, key) => {
    const [bid, gid] = key.split("_");
    const branch = BRANCHES.find(b => b.id === bid);
    const group  = GROUPS.find(g => g.id === gid);
    absentRows.push([extraNum++, "欠席", branch?.label ?? bid, group?.label ?? gid, "－", "－", new Date(ts).toLocaleString("ja-JP")].join(","));
  });

  const csv  = "\uFEFF" + [header, ...taimenRows, ...onlineRows, ...absentRows].join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = `役員会出欠_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`📥 CSV（対面${responses.length}件／💻${onlineMap.size}件／欠${absentMap.size}件）`);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// トースト
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2800);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 住所選択モーダル
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let addrState = { chome: null, banchi: null };

function openAddrModal() {
  addrState = { chome: null, banchi: null };
  renderAddrStep();
  document.getElementById("addrOverlay").classList.add("visible");
}

function closeAddrModal() {
  document.getElementById("addrOverlay").classList.remove("visible");
}

function addrBack() {
  if (addrState.banchi !== null) {
    addrState.banchi = null;
  } else if (addrState.chome !== null) {
    addrState.chome = null;
  } else {
    closeAddrModal();
    return;
  }
  renderAddrStep();
}

function renderAddrStep() {
  const titleEl      = document.getElementById("addrTitle");
  const breadcrumbEl = document.getElementById("addrBreadcrumb");
  const listEl       = document.getElementById("addrList");
  const backBtn      = document.getElementById("addrBackBtn");

  listEl.innerHTML = "";

  // ── STEP 1: 丁目選択 ──
  if (addrState.chome === null) {
    titleEl.textContent      = "丁目を選んでください";
    breadcrumbEl.textContent = "";
    backBtn.style.visibility = "hidden";

    Object.keys(ADDRESS_MAP).forEach(chome => {
      const btn = document.createElement("button");
      btn.className = "addr-btn";
      btn.innerHTML = `<span class="addr-btn-label">小川${chome}</span>`;
      btn.onclick = () => { addrState.chome = chome; renderAddrStep(); };
      listEl.appendChild(btn);
    });
    return;
  }

  backBtn.style.visibility = "visible";

  // ── STEP 2: 番地選択 ──
  if (addrState.banchi === null) {
    titleEl.textContent = "番地を選んでください";
    breadcrumbEl.innerHTML = `<span>小川${addrState.chome}</span>`;

    const banchiMap = ADDRESS_MAP[addrState.chome];
    if (!banchiMap || Object.keys(banchiMap).length === 0) {
      listEl.innerHTML = `<div class="addr-not-found">⚠️ この丁目のデータは<br>まだ登録されていません</div>`;
      return;
    }

    // 番地を数値順にソート
    const sorted = Object.keys(banchiMap).sort((a, b) => Number(a) - Number(b));
    sorted.forEach(banchi => {
      const goMap   = banchiMap[banchi];
      const vals    = Object.values(goMap);
      const unique  = [...new Set(vals.map(v => v.branch + '_' + v.group))];
      const decided = unique.length === 1; // 全号で支部・班が同一

      const btn = document.createElement("button");
      btn.className = "addr-btn";
      const goCount = Object.keys(goMap).length;

      if (decided) {
        // 番地タップで即確定
        const branch = BRANCHES.find(b => b.id === vals[0].branch);
        const group  = GROUPS.find(g => g.id === vals[0].group);
        btn.innerHTML = `
          <span class="addr-btn-label">${banchi}番地</span>
          <span class="addr-btn-sub">${branch?.label ?? ""} ${group?.label ?? ""}</span>
        `;
        btn.onclick = () => applyAddrResult(vals[0]);
      } else {
        // 号選択が必要
        btn.innerHTML = `
          <span class="addr-btn-label">${banchi}番地</span>
          <span class="addr-btn-sub">${goCount}件 ▶</span>
        `;
        btn.onclick = () => { addrState.banchi = banchi; renderAddrStep(); };
      }
      listEl.appendChild(btn);
    });
    return;
  }

  // ── STEP 3: 号選択 ──
  titleEl.textContent = "号を選んでください";
  breadcrumbEl.innerHTML =
    `<span>小川${addrState.chome}</span> ＞ <span>${addrState.banchi}番地</span>`;

  const goMap = ADDRESS_MAP[addrState.chome]?.[addrState.banchi];
  if (!goMap || Object.keys(goMap).length === 0) {
    listEl.innerHTML = `<div class="addr-not-found">⚠️ この番地のデータは<br>まだ登録されていません</div>`;
    return;
  }

  const sorted = Object.keys(goMap).sort((a, b) => Number(a) - Number(b));
  sorted.forEach(go => {
    const result = goMap[go];
    const branch = BRANCHES.find(b => b.id === result.branch);
    const group  = GROUPS.find(g => g.id === result.group);
    const btn = document.createElement("button");
    btn.className = "addr-btn";
    btn.innerHTML = `
      <span class="addr-btn-label">${go === '－' ? '号なし' : go + '号'}</span>
      <span class="addr-btn-sub">${branch?.label ?? ""} ${group?.label ?? ""}</span>
    `;
    btn.onclick = () => applyAddrResult(result);
    listEl.appendChild(btn);
  });
}

// 住所選択結果を支部・班に反映してモーダルを閉じる
function applyAddrResult(result) {
  answers.branch = result.branch;
  answers.group  = result.group;
  closeAddrModal();
  // 支部・班が確定したのでgroupの次のステップへ
  const flow = getFlow();
  const groupIdx = flow.indexOf("group");
  step = groupIdx + 1 < flow.length ? groupIdx + 1 : flow.length - 1;
  buildStep();
  const branch = BRANCHES.find(b => b.id === result.branch);
  const group  = GROUPS.find(g => g.id === result.group);
  showToast(`🏠 ${branch?.label} ${group?.label} に設定しました`);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 座席案内
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 座席レイアウト: 3列×4行（最上行は本部バー全幅）
// SEAT_LAYOUT[row][col] = { id:"支部ID", name:"表示名", seatCount:席数, headCount:支部長含む総人数 }
// または null（空欄）
const SEAT_LAYOUT = [
  // 行1: 本部役員席（grid-column: 1/-1）
  "honbu",
  // 行2（row0）: 左=下小川3, 中=下小川2, 右=下小川1
  [
    {id:"shimo3",  name:"下小川3支部", total:6},  // 支部長1+班長5
    {id:"shimo2",  name:"下小川2支部", total:5},  // 支部長1+班長4
    {id:"shimo1",  name:"下小川1支部", total:5},  // 支部長1+班長4
  ],
  // 行3（row1）: 左=柳谷戸2, 中=せんげん2, 右=せんげん1
  [
    {id:"yanagi2", name:"柳谷戸2支部", total:4},  // 支部長1+班長3
    {id:"sengn2",  name:"せんげん2支部",total:6}, // 支部長1+班長5
    {id:"sengn1",  name:"せんげん1支部",total:6}, // 支部長1+班長5
  ],
  // 行4（row2）: 左=柳谷戸3, 中=かえで, 右=柳谷戸1
  [
    {id:"yanagi3", name:"柳谷戸3支部", total:6},  // 支部長1+班長5
    {id:"kaede",   name:"かえで支部",  total:5},  // 支部長1+班長4
    {id:"yanagi1", name:"柳谷戸1支部", total:5},  // 支部長1+班長4
  ],
  // 行5（row3）: 左=空, 中=蜂谷戸2, 右=蜂谷戸1
  [
    null,
    {id:"hachi2",  name:"蜂谷戸2支部", total:5}, // 支部長1+班長4
    {id:"hachi1",  name:"蜂谷戸1支部", total:7}, // 支部長1+班長6
  ],
];

function showSeatOverlay(branchId, groupId) {
  const branch = BRANCHES.find(b => b.id === branchId);
  const group  = GROUPS.find(g => g.id === groupId);
  document.getElementById("seatYourSeat").textContent =
    `${branch?.label ?? ""} ${group?.label ?? ""}`;

  const mapEl = document.getElementById("seatMap");
  mapEl.innerHTML = "";

  SEAT_LAYOUT.forEach(row => {
    if (row === "honbu") {
      const bar = document.createElement("div");
      bar.className = "honbu-bar";
      bar.style.gridColumn = "1 / -1";
      bar.textContent = "本部役員席";
      mapEl.appendChild(bar);
      return;
    }
    row.forEach(cell => {
      const block = document.createElement("div");
      if (!cell) {
        block.className = "seat-block empty";
        mapEl.appendChild(block);
        return;
      }
      const isHighlight = cell.id === branchId;
      block.className = "seat-block" + (isHighlight ? " highlight" : "");

      // 支部名
      const nameEl = document.createElement("div");
      nameEl.className = "seat-block-name";
      nameEl.textContent = cell.name;
      block.appendChild(nameEl);

      // 席の丸（支部長1 + 班長n）
      const circlesEl = document.createElement("div");
      circlesEl.className = "seat-circles";
      for (let i = 0; i < cell.total; i++) {
        const c = document.createElement("div");
        c.className = "seat-circle";
        circlesEl.appendChild(c);
      }
      block.appendChild(circlesEl);

      mapEl.appendChild(block);
    });
  });

  document.getElementById("seatOverlay").classList.add("visible");
}

function closeSeatOverlay() {
  document.getElementById("seatOverlay").classList.remove("visible");
  showTab("input");
  answers = {};
  step    = 0;
  buildStep();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 設定モーダル
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function updateToggleUI() {
  const b = document.getElementById("toggle_showBanchoLine");
  const j = document.getElementById("toggle_showJichikaiLine");
  if (b) b.className = "toggle-track" + (settings.showBanchoLine   ? " on" : "");
  if (j) j.className = "toggle-track" + (settings.showJichikaiLine ? " on" : "");
}

async function toggleSetting(key) {
  settings[key] = !settings[key];
  saveSettings();
  updateToggleUI();
  // プログレスバー・現在ステップを即時更新
  if (step >= getFlow().length) step = 0;
  buildStep();
  // Firebase に同期
  pendingSettingsWrite++;
  try { await pushSettings(); } finally { pendingSettingsWrite--; }
}

function openSettings() {
  updateToggleUI();
  document.getElementById("settingsOverlay").classList.add("visible");
  document.getElementById("navInput").classList.remove("active");
  document.getElementById("navResult").classList.remove("active");
  document.getElementById("navSettings").classList.add("active");
}

function closeSettings() {
  document.getElementById("settingsOverlay").classList.remove("visible");
  // 入力画面に戻る
  showTab("input");
}

function showTab(name) {
  ["screenInput","screenResult"].forEach(id =>
    document.getElementById(id).classList.remove("visible"));
  document.getElementById("navInput").classList.remove("active");
  document.getElementById("navResult").classList.remove("active");
  document.getElementById("navSettings").classList.remove("active");
  if (name === "input") {
    document.getElementById("screenInput").classList.add("visible");
    document.getElementById("navInput").classList.add("active");
  } else {
    document.getElementById("screenResult").classList.add("visible");
    document.getElementById("navResult").classList.add("active");
    fetchData(true);
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 起動
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
buildStep();
startPoller();
fetchData(true);

// ─── 全ボタン共通タップフィードバック（バイブ＋色変化）───
document.addEventListener("pointerdown", e => {
  const btn = e.target.closest("button, a[href], [onclick]");
  if (!btn) return;
  // バイブレーション（対応端末のみ）
  if (navigator.vibrate) navigator.vibrate(40);
  // 色変化アニメ
  btn.classList.remove("tap-flash");
  void btn.offsetWidth; // reflow でアニメをリセット
  btn.classList.add("tap-flash");
  btn.addEventListener("animationend", () => btn.classList.remove("tap-flash"), {once: true});
});
